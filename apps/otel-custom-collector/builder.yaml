dist:
  name: otelcol-custom
  description: "SOC License Platform Custom OTel Collector"
  output_path: ./dist
  otelcol_version: "0.98.0"

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/loggingexporter v0.98.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.98.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.98.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.98.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.98.0
  - gomod: soclicenseprocessor v0.0.0
    path: ./processor/soclicenseprocessor

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v0.98.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v0.98.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v0.98.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v0.98.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v0.98.0
