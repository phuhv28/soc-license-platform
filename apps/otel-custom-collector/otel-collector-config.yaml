receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  soc_license_processor:
    redis_url: "soc-redis:6379"
  batch:
    send_batch_size: 100
    timeout: 1s

exporters:
  logging:
    verbosity: detailed

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [soc_license_processor, batch]
      exporters: [logging]
