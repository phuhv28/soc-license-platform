services:
  postgres:
    image: postgres:16
    container_name: soc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soc_license
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soc_license"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: soc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: soc-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://soc-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@soc-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  management-api-service:
    build:
      context: ./apps/management-api-service
    container_name: management-api-service
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soc_license
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_MANAGEMENT_API_URL: ""
        VITE_COLLECTOR_API_URL: ""
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - management-api-service


  event-producer:
    build:
      context: ./apps/event-producer
    deploy:
      replicas: 1
    environment:
      TENANT_IDS: "481a6ae5-8e14-4899-80b3-d95feb5a3395"
      EPS: "100"
      BATCH_SIZE: "50"
      COLLECTOR_URL: "http://haproxy:4318"
    depends_on:
      - haproxy

  haproxy:
    image: haproxy:2.8
    container_name: haproxy
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - soc-intake-gateway

  soc-intake-gateway:
    build:
      context: ./apps/soc-intake-gateway
    deploy:
      replicas: 3
    environment:
      REDIS_URL: soc-redis:6379
      KAFKA_BROKERS: soc-kafka:9092
      PORT: 8080
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  postgres_data:
  redis_data: